<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greg Zadrozny — Creative Director</title>
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="shortcut icon" href="assets/favicon/favicon.ico">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<style>
  :root { --bg:#e8ecf0; --fg:#0E0D0D; --tracking:0.02em;
          --ease:cubic-bezier(0.65,0,0.35,1); --easein:cubic-bezier(0.33,0,0.2,1); }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif; font-weight:400;
    background:var(--bg); color:var(--fg); text-transform:uppercase;
    user-select:none; -webkit-user-select:none; letter-spacing:var(--tracking);
    cursor:default;
  }
  .viewport { position:fixed; inset:0; overflow:hidden; cursor:grab; }
  .viewport.dragging { cursor:grabbing; }
  .canvas { position:absolute; left:0; top:0; width:1px; height:1px; will-change:transform; transform-origin:0 0; opacity:0; }

  .card-wrap { position:absolute; transition:left .55s var(--ease), top .55s var(--ease); }
  .card { width:100%; height:100%; cursor:pointer; overflow:hidden; position:relative;
    background:transparent; transition:transform 1.1s var(--ease), width .55s var(--ease), height .55s var(--ease); }
  .card:hover { transform:scale(1.08); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  .card img, .card video { width:100%; height:100%; object-fit:contain; display:block; pointer-events:none; background:transparent; }
  .card img { opacity:0; transition:opacity .4s var(--easein); }
  .card img.ld { opacity:1; }

  .hud { position:fixed; z-index:10; font-size:12px; letter-spacing:var(--tracking); line-height:1.4; color:var(--fg); }
  .hud-tl { top:30px; left:34px; height:30px; display:flex; align-items:center; z-index:115; }  /* name always on top + clickable */
  .hud-tr { top:30px; right:36px; height:30px; display:flex; align-items:center; }   /* matches X */
  .hud-bl { bottom:24px; left:34px; } .hud-br { bottom:24px; right:36px; text-align:right; }
  .hud-tl, .hud-tr, .hud-bl { animation: fadeUp .7s var(--easein) .5s backwards; }   /* text in after images */
  .hud-tr { transition: opacity .35s var(--easein); }                                /* close: ABOUT fades back fast */
  body.about-open .hud-tl, body.show-open .hud-tl { opacity:0; pointer-events:none; transition: opacity .5s var(--easein); }  /* header only on canvas + list */

  .uline { position:relative; cursor:pointer; display:inline-block; color:var(--fg); text-decoration:none; }
  .uline::after { content:""; position:absolute; left:0; bottom:-3px; height:1.5px; width:100%;
    background:currentColor; transform:scaleX(0); transform-origin:left center; transition:transform .55s var(--easein); }
  .uline:hover::after { transform:scaleX(1); }

  /* ===== OVERLAYS ===== */
  .overlay { position:fixed; inset:0; background:var(--bg); z-index:100;
    opacity:0; pointer-events:none; transition:opacity .8s var(--easein);
    display:flex; flex-direction:column; overflow:hidden; }
  .overlay.active { opacity:1; pointer-events:auto; }
  .overlay.closing { transition:opacity 1.15s ease; }   /* slightly slower reveal of the canvas on close */
  #about.closing { transition:opacity .65s ease; }
  .ov-close { position:absolute; top:30px; right:36px; width:30px; height:30px; background:none; border:none; cursor:pointer; z-index:120; display:flex; align-items:center; justify-content:flex-end; padding:0; }
  .ov-close svg { width:20px; height:20px; stroke:var(--fg); stroke-width:2; fill:none; opacity:.85; transition:opacity .2s ease, transform .2s var(--ease); }
  .ov-close:hover svg { opacity:1; }
  .overlay.closing .ov-close svg { opacity:0; transition:opacity .12s ease; }

  /* ===== PROJECT — FILMSTRIP SLIDESHOW ===== */
  .show-strip { flex:1; display:flex; align-items:center; gap:12px; overflow-x:auto; overflow-y:hidden;
    padding:72px 80px 40px 56px; min-height:0; scrollbar-width:none; }
  .show-strip.single { justify-content:center; }
  .show-strip::-webkit-scrollbar { display:none; }
  .slide { flex:0 0 auto; height:100%; aspect-ratio:var(--aspect,1.5); background:transparent; position:relative; }
  .slide img, .slide video { width:100%; height:100%; object-fit:contain; display:block; }
  .slide img { opacity:0; transition:opacity .4s var(--easein); }
  .slide img.ld { opacity:1; }
  .overlay.active .slide { animation: fadeUp .55s var(--easein) backwards; }
  .vtoggle { position:absolute; left:12px; bottom:12px; width:34px; height:34px; border:none; border-radius:50%;
    background:rgba(0,0,0,.45); color:#fff; cursor:pointer; font-size:12px; line-height:34px; text-align:center; padding:0;
    display:flex; align-items:center; justify-content:center; transition:background .2s ease; }
  .vtoggle:hover { background:rgba(0,0,0,.7); }
  .vtoggle svg { width:13px; height:13px; fill:#fff; }
  .atoggle { position:absolute; left:54px; bottom:12px; width:34px; height:34px; border:none; border-radius:50%;
    background:rgba(0,0,0,.45); color:#fff; cursor:pointer; padding:0; align-items:center; justify-content:center; display:flex; transition:background .2s ease; }
  .atoggle[hidden] { display:none; }
  .atoggle:hover { background:rgba(0,0,0,.7); }
  .atoggle svg { width:15px; height:15px; fill:#fff; }

  .show-caption { flex:0 0 auto; display:flex; justify-content:space-between; align-items:flex-end;
    gap:48px; padding:0 36px 56px 56px; color:var(--fg); font-size:12px; letter-spacing:var(--tracking);
    opacity:0; transform:translateY(14px); transition:opacity .6s var(--easein) .4s, transform .6s var(--easein) .4s; }
  .overlay.active .show-caption { opacity:1; transform:none; }
  .show-caption .meta { max-width:620px; line-height:1.4; }
  .show-caption .nm { display:block; margin-bottom:10px; }
  .show-caption .desc { display:block; margin-bottom:10px; }
  .show-caption .cl { display:block; }
  .show-caption .num { white-space:nowrap; }

  /* ===== ABOUT ===== */
  .about-inner { margin:auto; max-width:720px; padding:40px; font-size:12px; letter-spacing:var(--tracking); line-height:1.6;
    opacity:0; transform:translateY(12px); transition:opacity .6s var(--easein) .1s, transform .6s var(--easein) .1s; }
  .overlay.active .about-inner { opacity:1; transform:none; }
  .about-inner .a-name { display:block; margin-bottom:22px; }
  .about-inner p { margin-bottom:15px; }
  .about-inner .a-contact { margin-top:24px; }
  .about-inner .a-contact a,
  .about-inner .a-contact a:link,
  .about-inner .a-contact a:visited,
  .about-inner .a-contact a:hover,
  .about-inner .a-contact a:active,
  .about-inner .a-contact a:focus {
    position:relative; display:inline-block; color:var(--fg); opacity:1; visibility:visible;
    text-decoration:none; cursor:pointer; outline:none; -webkit-tap-highlight-color:transparent; }
  .about-inner .a-contact a::after { content:""; position:absolute; left:0; bottom:-3px; height:1.5px; width:100%;
    background:currentColor; transform:scaleX(1); transform-origin:right center; transition:transform .55s var(--easein); }
  .about-inner .a-contact a:hover::after { transform:scaleX(0); }

  /* ===== NAV: name-as-link + hamburger + project index list ===== */
  .uline-off { position:relative; cursor:pointer; display:inline-block; color:var(--fg); text-decoration:none; }
  .uline-off::after { content:""; position:absolute; left:0; bottom:-3px; height:1.5px; width:100%;
    background:currentColor; transform:scaleX(1); transform-origin:right center; transition:transform .55s var(--easein); }
  .uline-off:hover::after { transform:scaleX(0); }

  .menu-btn { width:20px; height:14px; padding:0; border:none; background:none; cursor:pointer; position:relative; transition:opacity .3s var(--ease); }
  .menu-btn span { position:absolute; left:0; width:100%; height:1.5px; background:var(--fg);   /* 1.5px = link-underline weight */
    transition:transform .4s var(--ease), opacity .3s var(--ease); }
  .menu-btn span:nth-child(1) { top:0; }
  .menu-btn span:nth-child(2) { top:50%; transform:translateY(-50%); }
  .menu-btn span:nth-child(3) { bottom:0; }
  .menu-btn:hover { opacity:.5; }   /* whole icon fades to gray on hover — same as list rows, works in ≡ and X states */
  /* hamburger morphs into an X whenever ANY overlay is open (site easing) — one consistent close everywhere */
  body.menu-open .menu-btn span:nth-child(1), body.about-open .menu-btn span:nth-child(1), body.show-open .menu-btn span:nth-child(1) { transform:translateY(6.25px) rotate(45deg); }
  body.menu-open .menu-btn span:nth-child(2), body.about-open .menu-btn span:nth-child(2), body.show-open .menu-btn span:nth-child(2) { opacity:0; }
  body.menu-open .menu-btn span:nth-child(3), body.about-open .menu-btn span:nth-child(3), body.show-open .menu-btn span:nth-child(3) { transform:translateY(-6.25px) rotate(-45deg); }
  body.menu-open .hud-tr, body.about-open .hud-tr, body.show-open .hud-tr { z-index:110; }   /* keep the X above every overlay */
  body.menu-open .hud-bl { z-index:110; }   /* PROJECTS·2026 stays above the list */

  .menu-inner { width:100%; height:100%; overflow-y:auto; overflow-x:hidden; padding:104px 28px 64px 34px;
    scrollbar-width:thin; scrollbar-color:var(--fg) transparent; }   /* right 28 + 8px scrollbar = aligns with the X at 36 */
  .menu-inner::-webkit-scrollbar { width:8px; }
  .menu-inner::-webkit-scrollbar-track { background:transparent; }
  .menu-inner::-webkit-scrollbar-thumb { background:var(--fg); border-radius:0; }   /* solid black rectangle */
  /* opaque bands so rows scroll cleanly under the fixed header/footer labels */
  .menu-mask { position:absolute; left:0; right:0; background:var(--bg); z-index:105; pointer-events:none; }
  .menu-mask-top { top:0; height:76px; } .menu-mask-bot { bottom:0; height:56px; }
  .mrow { display:grid; grid-template-columns:minmax(190px,340px) minmax(100px,180px) minmax(220px,500px) 1fr;
    align-items:center; gap:28px; padding:16px 2px; border-bottom:1px solid var(--fg);
    cursor:pointer; color:var(--fg); font-size:12px; letter-spacing:var(--tracking); transition:opacity .2s ease; }
  .mrow:hover { opacity:.5; }
  .m-num { text-align:right; white-space:nowrap; }
  .m-client, .m-note { line-height:1.35; }
  .m-note { margin-left:22px; }   /* extra breathing room between client and copyOverview */
  @keyframes fadeDown { from { opacity:1; transform:none; } to { opacity:0; transform:translateY(14px); } }
  .overlay.active .mrow  { animation:fadeUp   .5s var(--easein) backwards; animation-delay:calc(0.04s + var(--i,0) * 0.035s); }
  .overlay.closing .mrow { animation:fadeDown .4s var(--easein) forwards;  animation-delay:calc(var(--i,0) * 0.02s); }

  @media (max-width:768px) {
    .hud { font-size:11px; }
    .menu-inner { padding:88px 20px 48px; }
    .mrow { grid-template-columns:1fr auto; row-gap:7px; column-gap:16px; padding:18px 0; font-size:11px; }
    .m-name { grid-column:1; } .m-num { grid-column:2; text-align:right; align-self:start; }
    .m-client { grid-column:1 / -1; opacity:.7; margin-left:0; } .m-note { grid-column:1 / -1; opacity:.7; margin-left:0; }
    .hud-tl { height:auto; max-width:60vw; line-height:1.35; align-items:flex-start; }
    .hud-tr { align-items:flex-start; height:auto; line-height:1.35; }
    /* slideshow -> vertical stack, copy at top */
    .show-strip { order:2; flex-direction:column; align-items:stretch; gap:28px;
      overflow-x:hidden; overflow-y:auto; padding:14px 20px 48px; cursor:default !important; }
    .show-strip.single { justify-content:flex-start; }
    .slide { height:auto; width:100%; aspect-ratio:auto; }
    .slide img, .slide video { width:100%; height:auto; max-height:none; }
    .show-caption { order:1; flex-direction:column; align-items:flex-start; gap:8px; padding:92px 20px 18px; font-size:11px;
      transition:transform .4s var(--easein), opacity .4s var(--easein), margin-top .4s var(--easein); }
    .show-caption.tuck { transform:translateY(-14px); opacity:0; pointer-events:none; }
    .show-caption .meta { max-width:none; }
    .show-caption .num { display:none; }
    .about-inner { max-width:none; padding:88px 24px 48px; font-size:11px; }
  }
  /* laptop only: 1px smaller type overall + tighter project-page padding so slideshow images run larger */
  @media (min-width:769px) and (max-width:1799px) {
    .hud { font-size:11px; }
    .show-strip { padding:44px 80px 24px 56px; }        /* was 72 / 40 top-bottom -> more image height */
    .show-caption { font-size:11px; padding:0 36px 30px 56px; }  /* was 56px bottom */
    .about-inner { font-size:11px; }
  }
</style>
</head>
<body>

<div class="viewport" id="viewport"><div class="canvas" id="canvas"></div></div>

<div class="hud hud-tl"><span class="uline-off" id="aboutBtn">GREG ZADROZNY IS A CREATIVE DIRECTOR</span></div>
<div class="hud hud-tr"><button class="menu-btn" id="menuBtn" aria-label="Project index"><span></span><span></span><span></span></button></div>
<div class="hud hud-bl">PROJECTS · 2026</div>

<div class="overlay" id="show">
  <div class="show-strip" id="strip"></div>
  <div class="show-caption">
    <div class="meta">
      <span class="nm" id="capName"></span>
      <span class="desc" id="capDesc"></span>
      <span class="cl" id="capClient"></span>
    </div>
    <div class="num" id="capNum"></div>
  </div>
</div>

<div class="overlay" id="about">
  <div class="about-inner">
    <span class="a-name">__ABOUTHEAD__</span>
    __ABOUT__
    <p class="a-contact"><a href="mailto:hello@gregworking.com">Reach out for inquiries</a></p>
  </div>
</div>

<div class="overlay" id="menu">
  <div class="menu-mask menu-mask-top"></div>
  <div class="menu-mask menu-mask-bot"></div>
  <div class="menu-inner" id="menuList"></div>
</div>

<script>
  const PROJECTS = __PAYLOAD__;
  const ORDERED = PROJECTS.slice();   // stable Airtable order, preserved for the index/list view
  // Keep the first LOCK_COUNT projects in Airtable order (stable opening screen);
  // reshuffle everything after them on every page load so the canvas feels fresh.
  const LOCK_COUNT = 6;
  (function shuffleTail() {
    for (let i = PROJECTS.length - 1; i > LOCK_COUNT; i--) {
      const j = LOCK_COUNT + Math.floor(Math.random() * (i - LOCK_COUNT + 1));
      [PROJECTS[i], PROJECTS[j]] = [PROJECTS[j], PROJECTS[i]];
    }
  })();
  const CUR_L = `url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2732%27%20height%3D%2723%27%20viewBox%3D%270%200%20180.29%20129.05%27%3E%3Cg%20transform%3D%27translate%28180.29%2C0%29%20scale%28-1%2C1%29%27%3E%3Cpath%20d%3D%27M178.6%2C60.72l-.73-.69L114.53%2C0l-5.21%2C6.17%2C56.95%2C54.02-166.28.02v8.5l166.02.03-56.75%2C54.09%2C5.25%2C6.23%2C63.29-60.1c2.2-1.94%2C2.49-3.35%2C2.48-4.48%2C0-1.42-.51-2.57-1.67-3.75h-.02Z%27%20fill%3D%27%230E0D0D%27/%3E%3C/g%3E%3C/svg%3E") 16 11, pointer`, CUR_R = `url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2732%27%20height%3D%2723%27%20viewBox%3D%270%200%20180.29%20129.05%27%3E%3Cpath%20d%3D%27M178.6%2C60.72l-.73-.69L114.53%2C0l-5.21%2C6.17%2C56.95%2C54.02-166.28.02v8.5l166.02.03-56.75%2C54.09%2C5.25%2C6.23%2C63.29-60.1c2.2-1.94%2C2.49-3.35%2C2.48-4.48%2C0-1.42-.51-2.57-1.67-3.75h-.02Z%27%20fill%3D%27%230E0D0D%27/%3E%3C/svg%3E") 16 11, pointer`;
  const PLAY = '<svg viewBox="0 0 24 24"><polygon points="7 5 19 12 7 19"/></svg>';
  const PAUSE = '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';
  const SND_OFF = '<svg viewBox="0 0 24 24"><polygon points="3 9 3 15 7 15 12 19 12 5 7 9"/><line x1="16" y1="9" x2="22" y2="15" stroke="#fff" stroke-width="2"/><line x1="22" y1="9" x2="16" y2="15" stroke="#fff" stroke-width="2"/></svg>';
  const SND_ON  = '<svg viewBox="0 0 24 24"><polygon points="3 9 3 15 7 15 12 19 12 5 7 9"/><path d="M16 8.5a5 5 0 0 1 0 7" fill="none" stroke="#fff" stroke-width="2"/></svg>';
  const hasAudio = (v) => v.mozHasAudio || !!v.webkitAudioDecodedByteCount || !!(v.audioTracks && v.audioTracks.length);
  const isVideo = (m) => m && m.type && m.type.startsWith("video");
  const aspectOf = (m, d) => (m && m.w && m.h) ? m.w / m.h : d;
  function jit(seed) { let h = 2166136261; for (let i=0;i<seed.length;i++){h^=seed.charCodeAt(i);h=Math.imul(h,16777619);} return ((h>>>0)%1000)/1000*2-1; }

  /* ---- LAYOUT: balanced rows, gap-justified to fill width (no central void) ---- */
  const TARGET_ROW_W = 3000;
  // canvas spacing differs by device: desktop keeps the original airy layout; laptop/phone tighten
  function spacingFor(w) {
    if (w >= 1800) return { h:380, v:374, j:30, s:415 };  // desktop  (s = horizontal height)
    if (w >= 768)  return { h:200, v:140, j:20, s:250 };  // laptop
    return { h:124, v:132, j:16, s:306 };                  // phone
  }
  let _sp = spacingFor(innerWidth);
  let HGAP = _sp.h, VGAP = _sp.v, JIT = _sp.j, SHORT_SIDE = _sp.s;
  function sizeFor(p) {
    let a = Math.min(Math.max(aspectOf(p.thumb, 1), 0.62), 1.85);
    // verticals run taller than the horizontals' shared height; width follows the aspect
    const h = a < 1 ? Math.round(SHORT_SIDE * 1.3) : SHORT_SIDE;
    return { a, w: Math.round(h * a), h };
  }
  function partition(w, k) {
    const n = w.length, pre = [0];
    for (let i = 0; i < n; i++) pre.push(pre[i] + w[i]);
    const D = Array.from({length:n+1}, () => new Array(k+1).fill(Infinity));
    const P = Array.from({length:n+1}, () => new Array(k+1).fill(0));
    for (let i = 1; i <= n; i++) D[i][1] = pre[i];
    for (let j = 2; j <= k; j++) for (let i = 1; i <= n; i++) for (let x = j-1; x < i; x++) {
      const c = Math.max(D[x][j-1], pre[i]-pre[x]); if (c < D[i][j]) { D[i][j]=c; P[i][j]=x; } }
    const cuts = []; let i = n, j = k;
    while (j > 1) { const x = P[i][j]; cuts.unshift(x); i = x; j--; }
    const r = []; let s = 0; for (const c of cuts) { r.push([s, c]); s = c; } r.push([s, n]); return r;
  }
  const rowWidth = r => r.reduce((s, p) => s + p._s.w, 0) + (r.length - 1) * HGAP;
  // partition a sublist into balanced rows (~TARGET_ROW_W each)
  function rowsFor(list) {
    if (!list.length) return [];
    const sumW = list.reduce((s, p) => s + p._s.w + HGAP, 0);
    const rc = Math.max(1, Math.min(list.length, Math.round(sumW / (TARGET_ROW_W + HGAP))));
    return partition(list.map(p => p._s.w + HGAP), rc).map(([a, b]) => list.slice(a, b));
  }
  // lay out a group of rows; each row is gap-justified to groupTileW (its own zone width, so
  // the locked head's internal spacing never depends on the shuffled tail), then the justified
  // row is centered inside the shared globalTileW. y advances downward; returns the next y.
  function placeRows(rows, groupTileW, globalTileW, y0) {
    let y = y0;
    rows.forEach(r => {
      const bandH = Math.max(...r.map(p => p._s.h));
      const rowW = rowWidth(r);
      const extra = r.length > 1 ? Math.min((groupTileW - rowW) / (r.length - 1), HGAP * 0.55) : 0;
      const gap = HGAP + Math.max(0, extra);
      const justW = rowW + (gap - HGAP) * (r.length - 1);
      let x = (globalTileW - justW) / 2;
      r.forEach(p => {
        const dx = jit(p.slug + "x") * JIT, dy = jit(p.slug + "y") * JIT;
        p._pos = { x: x + dx, y: y + (bandH - p._s.h) / 2 + dy, w: p._s.w, h: p._s.h };
        x += p._s.w + gap;
      });
      y += bandH + VGAP;
    });
    return y;
  }
  function layout() {
    PROJECTS.forEach(p => { p._s = sizeFor(p); });
    const lock = Math.min(LOCK_COUNT, PROJECTS.length);
    const headRows = rowsFor(PROJECTS.slice(0, lock));   // fixed: depends only on the locked head
    const tailRows = rowsFor(PROJECTS.slice(lock));       // reshuffled each load
    const headTileW = headRows.length ? Math.max(...headRows.map(rowWidth)) : 0;
    const tailTileW = tailRows.length ? Math.max(...tailRows.map(rowWidth)) : 0;
    const globalTileW = Math.max(headTileW, tailTileW, 1);
    let y = placeRows(headRows, headTileW || globalTileW, globalTileW, 0);
    y = placeRows(tailRows, tailTileW || globalTileW, globalTileW, y);
    return { w: Math.round(globalTileW), h: Math.round(y) };
  }
  let TILE = layout();
  let PITCHX = TILE.w + HGAP, PITCHY = TILE.h;

  let scale = 1, introActive = true, introReady = false, introStart = 0, introX0 = 0, introY0 = 0;
  const INTRO_DUR = 1600, INTRO_SCALE = 0.38;
  const easeIO = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  const liveVids = new Set();
  const videoObserver = new IntersectionObserver((es) => {
    es.forEach(e => { const v = e.target;
      if (e.isIntersecting) { liveVids.add(v); if (!introActive) v.play().catch(()=>{}); }
      else { liveVids.delete(v); v.pause(); }
    });
  }, { rootMargin: "300px", threshold: 0.01 });

  const canvas = document.getElementById("canvas");
  const renderedTiles = new Set();
  function mediaEl(m) {
    if (!m) return '<div style="width:100%;height:100%;background:transparent"></div>';
    if (isVideo(m)) {
      if (innerWidth <= 768) return `<img src="${m.poster || m.file}" alt="" loading="lazy" decoding="async" onload="this.classList.add('ld')">`;  // mobile: static poster
      return `<video src="${m.file}" autoplay loop muted playsinline preload="none" webkit-playsinline${m.poster ? ` poster="${m.poster}"` : ""}></video>`;
    }
    return `<img src="${m.file}" alt="" loading="lazy" decoding="async" onload="this.classList.add('ld')">`;
  }
  function buildCard(p, col, rowT) {
    const wrap = document.createElement("div");
    wrap.className = "card-wrap";
    wrap.style.left = (p._pos.x + col * PITCHX) + "px";
    wrap.style.top  = (p._pos.y + rowT * PITCHY) + "px";
    wrap._p = p; wrap._col = col; wrap._row = rowT;
    wrap.innerHTML = `<div class="card" style="width:${p._pos.w}px;height:${p._pos.h}px;">${mediaEl(p.thumb)}</div>`;
    wrap.querySelectorAll("img").forEach(im => { if (im.complete && im.naturalWidth) im.classList.add("ld"); });
    const cardEl = wrap.querySelector(".card");
    cardEl.addEventListener("click", () => { if (dragDistance < 5) openShow(p); });
    const v = wrap.querySelector("video"); if (v) { v.muted = true; videoObserver.observe(v); }
    return wrap;
  }
  function renderTile(col, row) {
    const key = col + "," + row; if (renderedTiles.has(key)) return; renderedTiles.add(key);
    const frag = document.createDocumentFragment();
    PROJECTS.forEach(p => frag.appendChild(buildCard(p, col, row)));
    canvas.appendChild(frag);
  }
  function ensureTilesAroundView() {
    const cx = (-canvasX + innerWidth / 2) / scale, cy = (-canvasY + innerHeight / 2) / scale;
    const cCol = Math.floor(cx / PITCHX), cRow = Math.floor(cy / PITCHY);
    const rc = introActive ? Math.max(1, Math.ceil((innerWidth / scale / 2) / PITCHX)) : 1;
    const rr = introActive ? Math.max(1, Math.ceil((innerHeight / scale / 2) / PITCHY)) : 1;
    for (let dc = -rc; dc <= rc; dc++) for (let dr = -rr; dr <= rr; dr++) renderTile(cCol + dc, cRow + dr);
  }

  /* ---- DRAG: crisp 1:1 while held, smooth drift on release ---- */
  const viewport = document.getElementById("viewport");
  const _first = PROJECTS[0]._pos;
  let targetX = Math.round(-70 - _first.x);                              // first project cropped slightly off the left edge
  let targetY = Math.round(-45 - _first.y);                              // first row crops at the top edge (hint of more above)
  let canvasX = targetX, canvasY = targetY;
  let isDragging = false, startX = 0, startY = 0, dragStartX = 0, dragStartY = 0, dragDistance = 0;
  let velocityX = 0, velocityY = 0, lastX = 0, lastY = 0, lastT = 0;
  const FOLLOW = 0.12, FRICTION = 0.95, VMAX = 26;
  const clamp = (v) => Math.max(-VMAX, Math.min(VMAX, v));

  function pruneTiles() {                    // after the wide intro, drop the far-off tiles (frees video elements)
    const cx = (-canvasX + innerWidth / 2) / scale, cy = (-canvasY + innerHeight / 2) / scale;
    const cCol = Math.floor(cx / PITCHX), cRow = Math.floor(cy / PITCHY);
    canvas.querySelectorAll(".card-wrap").forEach(w => {
      if (Math.abs(w._col - cCol) > 1 || Math.abs(w._row - cRow) > 1) w.remove();
    });
    renderedTiles.clear();
    canvas.querySelectorAll(".card-wrap").forEach(w => renderedTiles.add(w._col + "," + w._row));
  }
  function endIntro() {
    if (!introActive) return;
    introActive = false; introReady = true; scale = 1; canvasX = targetX; canvasY = targetY;
    canvas.style.transition = "";                                     // hand transform control back to the rAF loop
    canvas.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(1)`;
    canvas.style.opacity = "1";
    // defer the heavy work (DOM prune + starting videos) so it can't hitch the reveal
    setTimeout(() => { pruneTiles(); liveVids.forEach(v => v.play().catch(()=>{})); }, 80);
  }
  function tick() {
    if (introActive) { requestAnimationFrame(tick); return; }        // CSS transition drives the intro zoom on the GPU
    if (isDragging) { canvasX = targetX; canvasY = targetY; }
    else {
      targetX += velocityX; targetY += velocityY;
      velocityX *= FRICTION; velocityY *= FRICTION;
      if (Math.abs(velocityX) < 0.02) velocityX = 0;
      if (Math.abs(velocityY) < 0.02) velocityY = 0;
      canvasX += (targetX - canvasX) * FOLLOW;
      canvasY += (targetY - canvasY) * FOLLOW;
    }
    canvas.style.transform = `translate3d(${canvasX.toFixed(1)}px, ${canvasY.toFixed(1)}px, 0) scale(${scale.toFixed(4)})`;
    ensureTilesAroundView();
    requestAnimationFrame(tick);
  }
  (function initIntro() {                    // start zoomed-out & hidden, focal point = final framing
    if (innerWidth <= 768) {                 // phones: no zoom intro -> render immediately & visible
      introActive = false; scale = 1; canvasX = targetX; canvasY = targetY; canvas.style.opacity = "1"; return;
    }
    const pxc = innerWidth / 2 - targetX, pyc = innerHeight / 2 - targetY;
    introX0 = innerWidth / 2 - INTRO_SCALE * pxc; introY0 = innerHeight / 2 - INTRO_SCALE * pyc;
    canvasX = introX0; canvasY = introY0; scale = INTRO_SCALE;
  })();
  function startReveal() {                       // GPU/compositor zoom — stays smooth even while thumbnails decode
    if (introReady || !introActive) return;
    introReady = true;
    canvas.style.transition = "none";
    canvas.style.transform = `translate3d(${introX0}px, ${introY0}px, 0) scale(${INTRO_SCALE})`;
    canvas.style.opacity = "0";
    void canvas.offsetWidth;                      // commit the zoomed-out start frame before transitioning
    canvas.style.transition = `transform ${INTRO_DUR}ms cubic-bezier(0.65,0,0.35,1), opacity 800ms ease`;
    requestAnimationFrame(() => {                 // next frame: animate to the final framing (compositor-driven)
      canvas.style.transform = `translate3d(${targetX}px, ${targetY}px, 0) scale(1)`;
      canvas.style.opacity = "1";
    });
    canvas.addEventListener("transitionend", function te(e) {
      if (e.propertyName !== "transform") return;
      canvas.removeEventListener("transitionend", te); endIntro();
    });
    setTimeout(endIntro, INTRO_DUR + 300);        // safety in case transitionend doesn't fire
  }
  function preloadThumbs() {                   // wait until every thumbnail image (static + video poster) is ready
    const urls = new Set();
    PROJECTS.forEach(p => { const m = p.thumb; if (!m) return; const u = (isVideo(m) && m.poster) ? m.poster : m.file; if (u) urls.add(u); });
    let pending = urls.size;
    if (!pending) return startReveal();
    urls.forEach(u => { const im = new Image(); im.onload = im.onerror = () => { if (--pending <= 0) startReveal(); }; im.src = u; });
    setTimeout(startReveal, 1000);             // reveal promptly even on a cold cache; thumbnails fade in as they load
  }
  ensureTilesAroundView(); requestAnimationFrame(tick); if (introActive) preloadThumbs();

  // re-tile with new spacing when the viewport crosses a device breakpoint
  const tierOf = (w) => w >= 1800 ? "d" : w >= 768 ? "l" : "p";
  let _tier = tierOf(innerWidth);
  addEventListener("resize", () => {
    const t = tierOf(innerWidth);
    if (t === _tier) return;
    _tier = t;
    const sp = spacingFor(innerWidth); HGAP = sp.h; VGAP = sp.v; JIT = sp.j; SHORT_SIDE = sp.s;
    TILE = layout(); PITCHX = TILE.w + HGAP; PITCHY = TILE.h;
    canvas.querySelectorAll(".card-wrap").forEach(wrap => {            // glide existing cards to new spots
      const p = wrap._p;
      wrap.style.left = (p._pos.x + wrap._col * PITCHX) + "px";
      wrap.style.top  = (p._pos.y + wrap._row * PITCHY) + "px";
      const c = wrap.querySelector(".card");
      if (c) { c.style.width = p._pos.w + "px"; c.style.height = p._pos.h + "px"; }
    });
    ensureTilesAroundView();
  });

  function startDrag(x, y) {
    endIntro();
    isDragging = true; viewport.classList.add("dragging");
    startX = x; startY = y; dragStartX = targetX; dragStartY = targetY; dragDistance = 0;
    velocityX = 0; velocityY = 0; lastX = x; lastY = y; lastT = performance.now();
  }
  function moveDrag(x, y) {
    if (!isDragging) return;
    const dx = x - startX, dy = y - startY; dragDistance = Math.hypot(dx, dy);
    targetX = dragStartX + dx; targetY = dragStartY + dy;
    const now = performance.now(), dt = now - lastT;
    if (dt > 0) { velocityX = clamp((x - lastX) / dt * 16); velocityY = clamp((y - lastY) / dt * 16); }
    lastX = x; lastY = y; lastT = now;
  }
  function endDrag() { if (!isDragging) return; isDragging = false; viewport.classList.remove("dragging"); }
  viewport.addEventListener("mousedown", e => { if (e.target.closest(".overlay")) return; startDrag(e.clientX, e.clientY); });
  addEventListener("mousemove", e => moveDrag(e.clientX, e.clientY));
  addEventListener("mouseup", endDrag);
  viewport.addEventListener("touchstart", e => { if (e.target.closest(".overlay")) return; startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  addEventListener("touchmove", e => { if (!isDragging) return; moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  addEventListener("touchend", endDrag);
  // two-finger trackpad swipe (and mouse wheel) pans the canvas
  viewport.addEventListener("wheel", (e) => {
    if (e.ctrlKey) return;                          // ignore pinch-zoom
    if (e.target.closest(".overlay")) return;       // let slideshow / about scroll normally
    e.preventDefault(); endIntro();
    const k = e.deltaMode === 1 ? 16 : 1;           // line-mode mice -> px
    targetX -= e.deltaX * k; targetY -= e.deltaY * k;
    canvasX = targetX; canvasY = targetY;
    velocityX = 0; velocityY = 0;
  }, { passive: false });

  /* ---- PROJECT SLIDESHOW ---- */
  const show = document.getElementById("show");
  const strip = document.getElementById("strip");
  const capName = document.getElementById("capName");
  const capDesc = document.getElementById("capDesc");
  const capClient = document.getElementById("capClient");
  const capNum = document.getElementById("capNum");
  let showCount = 0, single = false;

  function updateNum() {
    if (!showCount) return;
    const kids = [...strip.children]; let cur = 0; const sl = strip.scrollLeft;
    for (let i = 0; i < kids.length; i++) { if (kids[i].offsetLeft - strip.offsetLeft <= sl + 4) cur = i; }
    capNum.textContent = String(cur + 1).padStart(2, "0") + " / " + String(showCount).padStart(2, "0");
  }
  function openShow(p) {
    const list = [...(p.slides || []), ...(p.gallery || [])];
    const media = list.length ? list : (p.thumb ? [p.thumb] : []);
    showCount = media.length; single = showCount <= 1;
    strip.innerHTML = media.map(m => {
      const a = aspectOf(m, 1.5);
      const inner = isVideo(m)
        ? `<video src="${m.file}" autoplay loop muted playsinline${m.poster ? ` poster="${m.poster}"` : ""}></video><button class="vtoggle" aria-label="Play/pause">${PAUSE}</button><button class="atoggle" aria-label="Sound" hidden>${SND_OFF}</button>`
        : `<img src="${m.file}" alt="" loading="lazy" onload="this.classList.add('ld')">`;
      return `<div class="slide" style="--aspect:${a};">${inner}</div>`;
    }).join("");
    strip.querySelectorAll("img").forEach(im => { if (im.complete && im.naturalWidth) im.classList.add("ld"); });
    strip.querySelectorAll(".slide video").forEach(v => {              // reveal the sound button only when the clip actually has audio
      const aBtn = v.parentElement.querySelector(".atoggle"); if (!aBtn) return;
      const check = () => { if (hasAudio(v)) aBtn.hidden = false; };
      v.addEventListener("loadeddata", () => setTimeout(check, 700));
      v.addEventListener("playing", () => setTimeout(check, 700));
    });
    capName.textContent = p.name;
    capDesc.textContent = p.copy || "";
    capClient.textContent = p.client ? ("Client — " + p.client) : "";
    strip.scrollLeft = 0; strip.scrollTop = 0;
    const _cap = show.querySelector(".show-caption"); if (_cap) { _cap.classList.remove("tuck"); _cap.style.marginTop = ""; }
    capNum.textContent = single ? "" : ("01 / " + String(showCount).padStart(2, "0"));
    strip.classList.toggle("single", single);
    strip.style.cursor = single ? "default" : "";
    show.classList.remove("closing"); show.classList.add("active");
    document.body.classList.add("show-open");
    liveVids.forEach(v => v.pause());
  }
  function closeShow() {
    show.classList.add("closing"); show.classList.remove("active");
    document.body.classList.remove("show-open");
    liveVids.forEach(v => v.play().catch(()=>{}));
    setTimeout(() => { show.classList.remove("closing"); strip.innerHTML = ""; }, 1150);
  }
  window.closeShow = closeShow;
  function atEnd() { return strip.scrollLeft >= strip.scrollWidth - strip.clientWidth - 4; }
  function atStart() { return strip.scrollLeft <= 4; }
  function scrollStep(dir) {
    if (single) return;
    if (dir > 0 && atEnd()) strip.scrollTo({ left: 0, behavior: "smooth" });
    else if (dir < 0 && atStart()) strip.scrollTo({ left: strip.scrollWidth, behavior: "smooth" });
    else strip.scrollBy({ left: dir * strip.clientWidth * 0.8, behavior: "smooth" });
  }
  strip.addEventListener("scroll", updateNum, { passive: true });
  // mobile: copy slides up as you scroll down through images, slides back on scroll up
  let _lastSt = 0;
  strip.addEventListener("scroll", () => {
    if (innerWidth > 768) return;
    const cap = show.querySelector(".show-caption"); if (!cap) return;
    const st = strip.scrollTop;
    if (st > _lastSt + 4 && st > 36) { if (!cap.classList.contains("tuck")) { cap.style.marginTop = (-cap.offsetHeight) + "px"; cap.classList.add("tuck"); } }
    else if (st < _lastSt - 4 || st < 18) { if (cap.classList.contains("tuck")) { cap.classList.remove("tuck"); cap.style.marginTop = ""; } }
    _lastSt = st;
  }, { passive: true });
  strip.addEventListener("mousemove", e => {
    if (single || e.target.closest(".vtoggle") || e.target.closest(".atoggle")) { if (!single) strip.style.cursor = ""; return; }
    const r = strip.getBoundingClientRect();
    const left = (e.clientX - r.left) < r.width / 2;
    strip.style.cursor = left ? CUR_L : CUR_R; strip._dir = left ? -1 : 1;
  });
  strip.addEventListener("click", e => {
    const aTg = e.target.closest(".atoggle");
    if (aTg) {                                  // toggle sound
      const v = aTg.parentElement.querySelector("video");
      v.muted = !v.muted; aTg.innerHTML = v.muted ? SND_OFF : SND_ON;
      return;
    }
    const tg = e.target.closest(".vtoggle");
    if (tg) {                                   // targeted play/pause
      const v = tg.parentElement.querySelector("video");
      if (v.paused) { v.play(); tg.innerHTML = PAUSE; } else { v.pause(); tg.innerHTML = PLAY; }
      return;
    }
    if (single) return;
    scrollStep(strip._dir || 1);                // most of the slide navigates
  });

  /* ---- ABOUT ---- */
  const about = document.getElementById("about");
  document.getElementById("aboutBtn").addEventListener("click", () => {   // name always opens About, from anywhere
    if (show.classList.contains("active")) closeShow();
    if (menu.classList.contains("active")) closeMenu();
    about.classList.add("active"); document.body.classList.add("about-open"); liveVids.forEach(v => v.pause());
  });
  document.getElementById("aboutBtn").addEventListener("mousedown", e => e.stopPropagation());
  function closeAbout() { about.classList.add("closing"); about.classList.remove("active"); document.body.classList.remove("about-open"); liveVids.forEach(v => v.play().catch(()=>{})); setTimeout(()=>about.classList.remove("closing"), 700); }
  window.closeAbout = closeAbout;

  /* ---- PROJECT INDEX (list view) ---- */
  const menu = document.getElementById("menu");
  const menuList = document.getElementById("menuList");
  const escH = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  function buildMenuRows() {
    menuList.innerHTML = ORDERED.map((p, i) => {
      const n = (p.slides && p.slides.length) ? String(p.slides.length).padStart(2, "0") : "";
      return `<div class="mrow" data-i="${i}" style="--i:${i}">`
        + `<span class="m-name">${escH(p.name)}</span>`
        + `<span class="m-client">${escH(p.client || "")}</span>`
        + `<span class="m-note">${escH(p.overview || "")}</span>`
        + `<span class="m-num">${n}</span></div>`;
    }).join("");
  }
  function openMenu() {
    buildMenuRows();
    menu.classList.remove("closing");
    void menu.offsetWidth;                     // restart the staggered row entrance each open
    menu.classList.add("active");
    document.body.classList.add("menu-open");
    liveVids.forEach(v => v.pause());
  }
  function closeMenu() {
    menu.classList.add("closing"); menu.classList.remove("active");
    document.body.classList.remove("menu-open");
    liveVids.forEach(v => v.play().catch(()=>{}));
    setTimeout(() => menu.classList.remove("closing"), 1150);
  }
  window.closeMenu = closeMenu;
  const menuBtn = document.getElementById("menuBtn");
  // top-right button is the single, consistent control: closes whatever overlay is open, else opens the list
  menuBtn.addEventListener("click", () => {
    if (show.classList.contains("active")) closeShow();
    else if (about.classList.contains("active")) closeAbout();
    else if (menu.classList.contains("active")) closeMenu();
    else openMenu();
  });
  menuBtn.addEventListener("mousedown", e => e.stopPropagation());
  menuList.addEventListener("click", e => {
    const row = e.target.closest(".mrow"); if (!row) return;
    const p = ORDERED[+row.dataset.i];
    menu.classList.remove("active"); menu.classList.remove("closing");   // hide index instantly, project fades in
    document.body.classList.remove("menu-open");
    openShow(p);
  });

  addEventListener("keydown", e => {
    endIntro();
    if (show.classList.contains("active")) {
      if (e.key === "Escape") closeShow();
      else if (e.key === "ArrowRight") scrollStep(1);
      else if (e.key === "ArrowLeft") scrollStep(-1);
    } else if (about.classList.contains("active") && e.key === "Escape") closeAbout();
    else if (menu.classList.contains("active") && e.key === "Escape") closeMenu();
  });
</script>
</body>
</html>
