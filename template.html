<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREG ZADROZNY — PROJECTS</title>
<style>
  :root { --bg:#e8ecf0; --fg:#0E0D0D; --tracking:0.02em;
          --ease:cubic-bezier(0.65,0,0.35,1); --easein:cubic-bezier(0.33,0,0.2,1); }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif; font-weight:400;
    background:var(--bg); color:var(--fg); text-transform:uppercase;
    user-select:none; -webkit-user-select:none; letter-spacing:var(--tracking);
  }
  .viewport { position:fixed; inset:0; overflow:hidden; cursor:grab; }
  .viewport.dragging { cursor:grabbing; }
  .canvas { position:absolute; left:0; top:0; width:1px; height:1px; will-change:transform; }

  .card-wrap { position:absolute; }
  .card { width:100%; height:100%; cursor:pointer; overflow:hidden; position:relative;
    background:transparent; transition:transform 1.1s var(--ease); }
  .card:hover { transform:scale(1.135); }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px) scale(.985); } to { opacity:1; transform:none; } }
  .card.intro { animation: cardIn .7s var(--easein) both; }
  .card img, .card video { width:100%; height:100%; object-fit:contain; display:block; pointer-events:none; background:transparent; }

  .hud { position:fixed; z-index:10; font-size:12px; letter-spacing:var(--tracking); line-height:1.4; color:var(--fg); }
  .hud-tl { top:30px; left:34px; height:30px; display:flex; align-items:center; }
  .hud-tr { top:30px; right:36px; height:30px; display:flex; align-items:center; }   /* matches X */
  .hud-bl { bottom:24px; left:34px; } .hud-br { bottom:24px; right:36px; text-align:right; }

  .uline { position:relative; cursor:pointer; display:inline-block; color:var(--fg); text-decoration:none; }
  .uline::after { content:""; position:absolute; left:0; bottom:-3px; height:1px; width:100%;
    background:currentColor; transform:scaleX(0); transform-origin:left center; transition:transform .55s var(--easein); }
  .uline:hover::after { transform:scaleX(1); }

  /* ===== OVERLAYS ===== */
  .overlay { position:fixed; inset:0; background:var(--bg); z-index:100;
    opacity:0; pointer-events:none; transition:opacity .8s var(--easein);
    display:flex; flex-direction:column; overflow:hidden; }
  .overlay.active { opacity:1; pointer-events:auto; }
  .overlay.closing { transition:opacity .9s ease; }
  .ov-close { position:absolute; top:30px; right:36px; width:30px; height:30px; background:none; border:none; cursor:pointer; z-index:120; display:flex; align-items:center; justify-content:center; padding:0; }
  .ov-close svg { width:22px; height:22px; stroke:var(--fg); stroke-width:2; fill:none; opacity:.85; transition:opacity .2s ease; }
  .ov-close:hover svg { opacity:1; }

  /* ===== PROJECT — FILMSTRIP SLIDESHOW ===== */
  .show-strip { flex:1; display:flex; align-items:center; gap:6px; overflow-x:auto; overflow-y:hidden;
    padding:128px 140px 56px 90px; min-height:0; scrollbar-width:none; }
  .show-strip.single { justify-content:center; }
  .show-strip::-webkit-scrollbar { display:none; }
  .slide { flex:0 0 auto; height:100%; aspect-ratio:var(--aspect,1.5); background:transparent; position:relative; }
  .slide img, .slide video { width:100%; height:100%; object-fit:contain; display:block; }
  .vtoggle { position:absolute; left:12px; bottom:12px; width:34px; height:34px; border:none; border-radius:50%;
    background:rgba(0,0,0,.45); color:#fff; cursor:pointer; font-size:12px; line-height:34px; text-align:center; padding:0;
    display:flex; align-items:center; justify-content:center; transition:background .2s ease; }
  .vtoggle:hover { background:rgba(0,0,0,.7); }
  .vtoggle svg { width:13px; height:13px; fill:#fff; }

  .show-caption { flex:0 0 auto; display:flex; justify-content:space-between; align-items:flex-end;
    gap:48px; padding:0 140px 84px 90px; color:var(--fg); font-size:13px; letter-spacing:var(--tracking);
    opacity:0; transition:opacity .6s var(--easein) .55s; }
  .overlay.active .show-caption { opacity:1; }
  .show-caption .meta { max-width:1000px; line-height:1.4; }
  .show-caption .nm { display:block; margin-bottom:10px; }
  .show-caption .desc { display:block; margin-bottom:10px; }
  .show-caption .cl { display:block; }
  .show-caption .num { white-space:nowrap; }

  /* ===== ABOUT ===== */
  .about-inner { margin:auto; max-width:720px; padding:40px; font-size:13px; letter-spacing:var(--tracking); line-height:1.6;
    opacity:0; transform:translateY(12px); transition:opacity .6s var(--easein) .1s, transform .6s var(--easein) .1s; }
  .overlay.active .about-inner { opacity:1; transform:none; }
  .about-inner .a-name { display:block; margin-bottom:22px; }
  .about-inner p { margin-bottom:15px; }

  @media (max-width:768px) {
    .show-strip { padding:96px 24px 16px 24px; }
    .show-caption { flex-direction:column; align-items:flex-start; gap:8px; padding:0 24px 28px; }
    .show-caption .meta { max-width:none; }
  }
</style>
</head>
<body>

<div class="viewport" id="viewport"><div class="canvas" id="canvas"></div></div>

<div class="hud hud-tl">GREG ZADROZNY IS A CREATIVE DIRECTOR</div>
<div class="hud hud-tr"><span class="uline" id="aboutBtn">ABOUT</span></div>
<div class="hud hud-bl">PROJECTS · 2026</div>

<div class="overlay" id="show">
  <button class="ov-close" onclick="closeShow()" aria-label="Close"><svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg></button>
  <div class="show-strip" id="strip"></div>
  <div class="show-caption">
    <div class="meta">
      <span class="nm" id="capName"></span>
      <span class="desc" id="capDesc"></span>
      <span class="cl" id="capClient"></span>
    </div>
    <div class="num" id="capNum"></div>
  </div>
</div>

<div class="overlay" id="about">
  <button class="ov-close" onclick="closeAbout()" aria-label="Close"><svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg></button>
  <div class="about-inner">
    <span class="a-name">__ABOUTHEAD__</span>
    __ABOUT__
  </div>
</div>

<script>
  const PROJECTS = __PAYLOAD__;
  const CUR_L = `url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2746%27%20height%3D%2746%27%20viewBox%3D%270%200%2046%2046%27%3E%3Cpolyline%20points%3D%2727%2013%2015%2023%2027%2033%27%20fill%3D%27none%27%20stroke%3D%27%230E0D0D%27%20stroke-width%3D%272%27/%3E%3C/svg%3E") 23 23, pointer`, CUR_R = `url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2746%27%20height%3D%2746%27%20viewBox%3D%270%200%2046%2046%27%3E%3Cpolyline%20points%3D%2719%2013%2031%2023%2019%2033%27%20fill%3D%27none%27%20stroke%3D%27%230E0D0D%27%20stroke-width%3D%272%27/%3E%3C/svg%3E") 23 23, pointer`;
  const PLAY = '<svg viewBox="0 0 24 24"><polygon points="7 5 19 12 7 19"/></svg>';
  const PAUSE = '<svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';
  const isVideo = (m) => m && m.type && m.type.startsWith("video");
  const aspectOf = (m, d) => (m && m.w && m.h) ? m.w / m.h : d;
  function jit(seed) { let h = 2166136261; for (let i=0;i<seed.length;i++){h^=seed.charCodeAt(i);h=Math.imul(h,16777619);} return ((h>>>0)%1000)/1000*2-1; }

  /* ---- LAYOUT: balanced rows, gap-justified to fill width (no central void) ---- */
  const TARGET_ROW_W = 2000;
  const HGAP = 208, VGAP = 204, JIT = 24;
  const SHORT_SIDE = 270;   // horizontal height == vertical width
  function sizeFor(p) {
    let a = Math.min(Math.max(aspectOf(p.thumb, 1), 0.62), 1.85);
    // horizontals: fixed height; verticals: fixed width (== horizontal height) so verticals scale up
    return a >= 1
      ? { a, w: Math.round(SHORT_SIDE * a), h: SHORT_SIDE }
      : { a, w: SHORT_SIDE, h: Math.round(SHORT_SIDE / a) };
  }
  function partition(w, k) {
    const n = w.length, pre = [0];
    for (let i = 0; i < n; i++) pre.push(pre[i] + w[i]);
    const D = Array.from({length:n+1}, () => new Array(k+1).fill(Infinity));
    const P = Array.from({length:n+1}, () => new Array(k+1).fill(0));
    for (let i = 1; i <= n; i++) D[i][1] = pre[i];
    for (let j = 2; j <= k; j++) for (let i = 1; i <= n; i++) for (let x = j-1; x < i; x++) {
      const c = Math.max(D[x][j-1], pre[i]-pre[x]); if (c < D[i][j]) { D[i][j]=c; P[i][j]=x; } }
    const cuts = []; let i = n, j = k;
    while (j > 1) { const x = P[i][j]; cuts.unshift(x); i = x; j--; }
    const r = []; let s = 0; for (const c of cuts) { r.push([s, c]); s = c; } r.push([s, n]); return r;
  }
  function layout() {
    PROJECTS.forEach(p => { p._s = sizeFor(p); });
    const N = PROJECTS.length;
    const sumW = PROJECTS.reduce((s, p) => s + p._s.w + HGAP, 0);
    const rowCount = Math.max(1, Math.min(N, Math.round(sumW / (TARGET_ROW_W + HGAP))));
    const rows = partition(PROJECTS.map(p => p._s.w + HGAP), rowCount).map(([a, b]) => PROJECTS.slice(a, b));
    const rowW = rows.map(r => r.reduce((s, p) => s + p._s.w, 0) + (r.length - 1) * HGAP);
    const tileW = Math.max(...rowW);
    let y = 0;
    rows.forEach((r, ri) => {
      const bandH = Math.max(...r.map(p => p._s.h));
      // gap-justify: spread leftover space into the gaps so each row fills tileW (capped)
      const extra = r.length > 1 ? Math.min((tileW - rowW[ri]) / (r.length - 1), HGAP * 0.9) : 0;
      const gap = HGAP + Math.max(0, extra);
      let x = (tileW - (rowW[ri] + (gap - HGAP) * (r.length - 1))) / 2;
      r.forEach(p => {
        const dx = jit(p.slug + "x") * JIT, dy = jit(p.slug + "y") * JIT;
        p._pos = { x: x + dx, y: y + (bandH - p._s.h) / 2 + dy, w: p._s.w, h: p._s.h };
        x += p._s.w + gap;
      });
      y += bandH + VGAP;
    });
    return { w: Math.round(tileW), h: Math.round(y) };
  }
  const TILE = layout();
  const PITCHX = TILE.w + HGAP, PITCHY = TILE.h;

  const videoObserver = new IntersectionObserver((es) => {
    es.forEach(e => { const v = e.target; if (e.isIntersecting) v.play().catch(()=>{}); else v.pause(); });
  }, { rootMargin: "300px", threshold: 0.01 });

  const canvas = document.getElementById("canvas");
  const renderedTiles = new Set();
  function mediaEl(m) {
    if (!m) return '<div style="width:100%;height:100%;background:transparent"></div>';
    if (isVideo(m)) return `<video src="${m.file}" autoplay loop muted playsinline preload="auto" webkit-playsinline></video>`;
    return `<img src="${m.file}" alt="" loading="lazy" decoding="async">`;
  }
  let introMode = true, introIdx = 0;
  function buildCard(p, col, rowT) {
    const wrap = document.createElement("div");
    wrap.className = "card-wrap";
    wrap.style.left = (p._pos.x + col * PITCHX) + "px";
    wrap.style.top  = (p._pos.y + rowT * PITCHY) + "px";
    wrap.innerHTML = `<div class="card" style="width:${p._pos.w}px;height:${p._pos.h}px;">${mediaEl(p.thumb)}</div>`;
    const cardEl = wrap.querySelector(".card");
    if (introMode) { cardEl.classList.add("intro"); cardEl.style.animationDelay = Math.min(introIdx * 0.03, 0.6) + "s"; introIdx++; }
    cardEl.addEventListener("click", () => { if (dragDistance < 5) openShow(p); });
    const v = wrap.querySelector("video"); if (v) { v.muted = true; videoObserver.observe(v); }
    return wrap;
  }
  function renderTile(col, row) {
    const key = col + "," + row; if (renderedTiles.has(key)) return; renderedTiles.add(key);
    const frag = document.createDocumentFragment();
    PROJECTS.forEach(p => frag.appendChild(buildCard(p, col, row)));
    canvas.appendChild(frag);
  }
  function ensureTilesAroundView() {
    const cx = -canvasX + innerWidth / 2, cy = -canvasY + innerHeight / 2;
    const cCol = Math.floor(cx / PITCHX), cRow = Math.floor(cy / PITCHY);
    for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) renderTile(cCol + dc, cRow + dr);
  }

  /* ---- DRAG: crisp 1:1 while held, smooth drift on release ---- */
  const viewport = document.getElementById("viewport");
  let targetX = 80, targetY = 120;
  let canvasX = targetX, canvasY = targetY;
  let isDragging = false, startX = 0, startY = 0, dragStartX = 0, dragStartY = 0, dragDistance = 0;
  let velocityX = 0, velocityY = 0, lastX = 0, lastY = 0, lastT = 0;
  const FOLLOW = 0.12, FRICTION = 0.95, VMAX = 26;
  const clamp = (v) => Math.max(-VMAX, Math.min(VMAX, v));

  function tick() {
    if (isDragging) { canvasX = targetX; canvasY = targetY; }
    else {
      targetX += velocityX; targetY += velocityY;
      velocityX *= FRICTION; velocityY *= FRICTION;
      if (Math.abs(velocityX) < 0.02) velocityX = 0;
      if (Math.abs(velocityY) < 0.02) velocityY = 0;
      canvasX += (targetX - canvasX) * FOLLOW;
      canvasY += (targetY - canvasY) * FOLLOW;
    }
    canvas.style.transform = `translate3d(${Math.round(canvasX)}px, ${Math.round(canvasY)}px, 0)`;
    ensureTilesAroundView();
    requestAnimationFrame(tick);
  }
  ensureTilesAroundView(); introMode = false; requestAnimationFrame(tick);

  function startDrag(x, y) {
    isDragging = true; viewport.classList.add("dragging");
    startX = x; startY = y; dragStartX = targetX; dragStartY = targetY; dragDistance = 0;
    velocityX = 0; velocityY = 0; lastX = x; lastY = y; lastT = performance.now();
  }
  function moveDrag(x, y) {
    if (!isDragging) return;
    const dx = x - startX, dy = y - startY; dragDistance = Math.hypot(dx, dy);
    targetX = dragStartX + dx; targetY = dragStartY + dy;
    const now = performance.now(), dt = now - lastT;
    if (dt > 0) { velocityX = clamp((x - lastX) / dt * 16); velocityY = clamp((y - lastY) / dt * 16); }
    lastX = x; lastY = y; lastT = now;
  }
  function endDrag() { if (!isDragging) return; isDragging = false; viewport.classList.remove("dragging"); }
  viewport.addEventListener("mousedown", e => { if (e.target.closest(".overlay")) return; startDrag(e.clientX, e.clientY); });
  addEventListener("mousemove", e => moveDrag(e.clientX, e.clientY));
  addEventListener("mouseup", endDrag);
  viewport.addEventListener("touchstart", e => { if (e.target.closest(".overlay")) return; startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  addEventListener("touchmove", e => { if (!isDragging) return; moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  addEventListener("touchend", endDrag);

  /* ---- PROJECT SLIDESHOW ---- */
  const show = document.getElementById("show");
  const strip = document.getElementById("strip");
  const capName = document.getElementById("capName");
  const capDesc = document.getElementById("capDesc");
  const capClient = document.getElementById("capClient");
  const capNum = document.getElementById("capNum");
  let showCount = 0, single = false;

  function updateNum() {
    if (!showCount) return;
    const kids = [...strip.children]; let cur = 0; const sl = strip.scrollLeft;
    for (let i = 0; i < kids.length; i++) { if (kids[i].offsetLeft - strip.offsetLeft <= sl + 4) cur = i; }
    capNum.textContent = String(cur + 1).padStart(2, "0") + " / " + String(showCount).padStart(2, "0");
  }
  function openShow(p) {
    const list = [...(p.slides || []), ...(p.gallery || [])];
    const media = list.length ? list : (p.thumb ? [p.thumb] : []);
    showCount = media.length; single = showCount <= 1;
    strip.innerHTML = media.map(m => {
      const a = aspectOf(m, 1.5);
      const inner = isVideo(m)
        ? `<video src="${m.file}" autoplay loop muted playsinline></video><button class="vtoggle" aria-label="Play/pause">${PAUSE}</button>`
        : `<img src="${m.file}" alt="" loading="lazy">`;
      return `<div class="slide" style="--aspect:${a};">${inner}</div>`;
    }).join("");
    capName.textContent = p.name;
    capDesc.textContent = p.copy || "";
    capClient.textContent = p.client ? ("Client — " + p.client) : "";
    strip.scrollLeft = 0;
    capNum.textContent = single ? "" : ("01 / " + String(showCount).padStart(2, "0"));
    strip.classList.toggle("single", single);
    strip.style.cursor = single ? "default" : "";
    show.classList.remove("closing"); show.classList.add("active");
  }
  function closeShow() {
    show.classList.add("closing"); show.classList.remove("active");
    setTimeout(() => { show.classList.remove("closing"); strip.innerHTML = ""; }, 900);
  }
  window.closeShow = closeShow;
  function atEnd() { return strip.scrollLeft >= strip.scrollWidth - strip.clientWidth - 4; }
  function atStart() { return strip.scrollLeft <= 4; }
  function scrollStep(dir) {
    if (single) return;
    if (dir > 0 && atEnd()) strip.scrollTo({ left: 0, behavior: "smooth" });
    else if (dir < 0 && atStart()) strip.scrollTo({ left: strip.scrollWidth, behavior: "smooth" });
    else strip.scrollBy({ left: dir * strip.clientWidth * 0.8, behavior: "smooth" });
  }
  strip.addEventListener("scroll", updateNum, { passive: true });
  strip.addEventListener("mousemove", e => {
    if (single || e.target.closest(".vtoggle")) { if (!single) strip.style.cursor = ""; return; }
    const r = strip.getBoundingClientRect();
    const left = (e.clientX - r.left) < r.width / 2;
    strip.style.cursor = left ? CUR_L : CUR_R; strip._dir = left ? -1 : 1;
  });
  strip.addEventListener("click", e => {
    const tg = e.target.closest(".vtoggle");
    if (tg) {                                   // targeted play/pause
      const v = tg.parentElement.querySelector("video");
      if (v.paused) { v.play(); tg.innerHTML = PAUSE; } else { v.pause(); tg.innerHTML = PLAY; }
      return;
    }
    if (single) return;
    scrollStep(strip._dir || 1);                // most of the slide navigates
  });

  /* ---- ABOUT ---- */
  const about = document.getElementById("about");
  document.getElementById("aboutBtn").addEventListener("click", () => about.classList.add("active"));
  document.getElementById("aboutBtn").addEventListener("mousedown", e => e.stopPropagation());
  function closeAbout() { about.classList.add("closing"); about.classList.remove("active"); setTimeout(()=>about.classList.remove("closing"), 900); }
  window.closeAbout = closeAbout;

  addEventListener("keydown", e => {
    if (show.classList.contains("active")) {
      if (e.key === "Escape") closeShow();
      else if (e.key === "ArrowRight") scrollStep(1);
      else if (e.key === "ArrowLeft") scrollStep(-1);
    } else if (about.classList.contains("active") && e.key === "Escape") closeAbout();
  });
</script>
</body>
</html>
