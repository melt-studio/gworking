name: Scheduled rebuild
# Safety net: re-trigger a Vercel deploy on a schedule so Airtable edits publish
# even if the Airtable automation misses a change. Also runnable manually.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC); change the interval here
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set; skipping."; exit 0
          fi
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" && echo "Deploy triggered."
